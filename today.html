<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Today's Schedule</title>
  <meta name="color-scheme" content="light only" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: auto !important;
      min-height: 0 !important;
      overflow: visible;
    }
    body {
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #fff;
      color: #003A70;
    }
    .today-shell { max-width: 1200px; margin: 0 auto; padding: 1rem; }
    .today-date {
      text-align: center;
      font-size: 0.875rem;
      color: #4b4f58;
      margin-bottom: 1rem;
    }
    .schedule-card {
      border-radius: 0.95rem;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
    }
    .schedule-columns {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      /* Fixed rem max-height only — vh causes iframe auto-height feedback loops */
      max-height: 32rem;
      overflow-y: auto;
    }
    .schedule-columns::-webkit-scrollbar { width: 8px; }
    .schedule-columns::-webkit-scrollbar-track { background: #f1f1f1; }
    .schedule-columns::-webkit-scrollbar-thumb { background: #a8a8a8; border-radius: 4px; }
    .schedule-columns::-webkit-scrollbar-thumb:hover { background: #888; }
    .center-block {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }
    .header-cell {
      appearance: none;
      border: 0;
      background: #003A70;
      color: #fff;
      text-align: center;
      font: inherit;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.875rem 0.85rem;
      width: 100%;
      position: sticky;
      top: 0;
      z-index: 2;
      cursor: default;
    }
    .center-column {
      flex: 1;
      padding: 1.25rem 1.25rem 1.25rem;
      min-height: 0;
    }
    .center-block:first-child .center-column { padding-left: 1.5rem; }
    .center-block:last-child .center-column { padding-right: 1.5rem; }
    .center-block:not(:first-child) .center-column {
      border-left: 1px solid #e9eef4;
      padding-left: 2rem;
    }
    .center-block:not(:last-child) .center-column {
      padding-right: 2rem;
    }
    .schedule-row {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: .5rem;
      align-items: start;
      padding: 0.35rem 0;
    }
    .schedule-time {
      color: #0085ad;
      font-weight: 600;
      font-size: 0.725rem;
      line-height: 1.25;
      display: flex;
      flex-direction: column;
    }
    .schedule-name {
      color: #484b51;
      font-size: 0.85rem;
      line-height: 1.35;
    }
    .empty-msg {
      color: #9ca3af;
      font-size: 0.9375rem;
      text-align: center;
      padding: 2rem 0.5rem;
    }
    .loading, .error {
      text-align: center;
      padding: 3rem 1rem;
      color: #6b7280;
    }
    .error { color: #b91c1c; }
    .header-toggle {
      display: none;
      width: 1em;
      height: 1em;
      margin-left: 0.5rem;
      flex-shrink: 0;
      transition: transform 0.2s ease;
    }
    .header-toggle::before {
      content: '';
      display: block;
      width: 0.45em;
      height: 0.45em;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(45deg);
      margin: 0.05em auto 0;
    }

    @media (max-width: 960px) {
      .schedule-columns { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .center-block:not(:first-child) .center-column { border-left: none; }
      .center-block:nth-child(even) .center-column { border-left: 1px solid #e9eef4; }
      .center-block:nth-child(n+3) .center-column { border-top: 1px solid #e9eef4; }
    }

    /* Mobile: stacked sections with header above each schedule + collapsible */
    @media (max-width: 560px) {
      .today-shell { padding: 0.75rem; }
      .schedule-columns {
        display: block;
        max-height: none;
        overflow: visible;
      }
      .center-block {
        border-left: none !important;
        border-top: none !important;
      }
      .center-block + .center-block {
        border-top: 1px solid #e9eef4;
      }
      .center-block .center-column {
        border-left: none !important;
        border-top: none !important;
        padding: 0.85rem 1rem 1rem !important;
      }
      .header-cell {
        position: static;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
        cursor: pointer;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      .header-cell:active { filter: brightness(1.08); }
      .header-toggle { display: inline-block; }
      .center-block.collapsed .header-toggle { transform: rotate(-90deg); }
      .center-block.collapsed .center-column { display: none; }
      .schedule-row {
        grid-template-columns: auto 1fr;
        gap: 0.75rem;
      }
      .schedule-time { font-size: 0.6875rem; }
    }
  </style>
</head>
<body>
  <div class="today-shell">
    <div id="dateLabel" class="today-date"></div>
    <div id="status" class="loading">Loading today's schedule…</div>
    <div id="card" class="schedule-card" hidden></div>
  </div>

  <script src="./js/schedule-data.js"></script>
  <script>
    const { CENTERS, loadAllCenterData, getTodayEventsByCenter, formatTimeRangeMultiline, parseViewDate } = ScheduleData;

    const params = new URLSearchParams(location.search);
    const viewDate = parseViewDate(params.get('date'));

    const statusEl = document.getElementById('status');
    const cardEl = document.getElementById('card');
    const dateLabelEl = document.getElementById('dateLabel');

    dateLabelEl.textContent = viewDate.toLocaleDateString(undefined, {
      weekday: 'long', month: 'long', day: 'numeric', year: 'numeric',
    });

    const isMobile = () => window.matchMedia('(max-width: 560px)').matches;

    function renderRow(event) {
      const time = formatTimeRangeMultiline(event.start, event.end);
      const row = document.createElement('div');
      row.className = 'schedule-row';
      row.innerHTML = `
        <div class="schedule-time">
          <span>${time.start}</span>
          <span>${time.end}</span>
        </div>
        <div class="schedule-name">${event.name}</div>`;
      return row;
    }

    function renderCenterBlock(centerKey, events, index) {
      const block = document.createElement('article');
      block.className = 'center-block';
      block.dataset.center = centerKey;

      const header = document.createElement('button');
      header.type = 'button';
      header.className = 'header-cell';
      header.setAttribute('aria-expanded', 'true');
      header.innerHTML = `<span>${CENTERS[centerKey].label}</span><span class="header-toggle" aria-hidden="true"></span>`;

      const column = document.createElement('div');
      column.className = 'center-column';

      if (!events.length) {
        const empty = document.createElement('div');
        empty.className = 'empty-msg';
        empty.textContent = 'No activities scheduled';
        column.appendChild(empty);
      } else {
        events.forEach(e => column.appendChild(renderRow(e)));
      }

      header.addEventListener('click', () => {
        if (!isMobile()) return;
        const collapsed = block.classList.toggle('collapsed');
        header.setAttribute('aria-expanded', String(!collapsed));
        reportHeight();
      });

      // Collapse all but Community Center. Desktop CSS ignores .collapsed;
      // mobile media query hides .collapsed sections.
      if (index > 0) {
        block.classList.add('collapsed');
        header.setAttribute('aria-expanded', 'false');
      }

      block.appendChild(header);
      block.appendChild(column);
      return block;
    }

    async function init() {
      try {
        const allCenterEvents = await loadAllCenterData();
        const byCenter = getTodayEventsByCenter(allCenterEvents, viewDate);

        const columns = document.createElement('div');
        columns.className = 'schedule-columns';

        Object.keys(CENTERS).forEach((key, index) => {
          columns.appendChild(renderCenterBlock(key, byCenter[key], index));
        });

        cardEl.innerHTML = '';
        cardEl.appendChild(columns);

        statusEl.hidden = true;
        cardEl.hidden = false;
        reportHeight();
      } catch (err) {
        statusEl.className = 'error';
        statusEl.textContent = 'Could not load schedule. Please try again later.';
        console.error(err);
        reportHeight();
      }
    }

    function reportHeight() {
      if (window.parent === window) return;
      const shell = document.querySelector('.today-shell');
      const height = shell
        ? Math.ceil(shell.getBoundingClientRect().height + shell.offsetTop)
        : Math.ceil(document.documentElement.scrollHeight);
      window.parent.postMessage(
        { type: "gmcc-schedule-height", height },
        "*"
      );
    }
    reportHeight();
    const shellEl = document.querySelector('.today-shell');
    if (shellEl) new ResizeObserver(reportHeight).observe(shellEl);

    init();
  </script>
</body>
</html>
